<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BorderFlow AI</title>
<style>
:root{--bg:#f5f6f8;--card:#fff;--bd:#e2e5ea;--tx:#1a1d23;--sub:#6b7280;--ht:#9ca3af;--bl:#1565c0;--blbg:#e8f1fb;--gn:#1D9E75;--gnbg:#e6f7f1;--rd:#c62828;--rdbg:#fce4ec;--am:#d97706;--ambg:#fef3c7;--pu:#7c3aed;--pubg:#ede9fe;--tl:#0e7490;--tlbg:#e0f7fa}
@media(prefers-color-scheme:dark){:root{--bg:#0f1117;--card:#181b23;--bd:#282d3a;--tx:#e5e7eb;--sub:#9ca3af;--ht:#6b7280;--bl:#60a5fa;--blbg:#1e293b;--gn:#34d399;--gnbg:#162a23;--rd:#f87171;--rdbg:#2d1a1e;--am:#fbbf24;--ambg:#2a2416;--pu:#a78bfa;--pubg:#1f1a2e;--tl:#22d3ee;--tlbg:#0c2a33}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN",sans-serif;background:var(--bg);color:var(--tx);line-height:1.5}
.app{max-width:940px;margin:0 auto;padding:20px 16px 60px}
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.logo{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#0C447C,#1D9E75);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.bc{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--sub);margin-bottom:16px;flex-wrap:wrap}
.bc a{color:var(--bl);cursor:pointer;text-decoration:none;font-weight:500}
.flows{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.fc{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:22px;cursor:pointer;transition:.15s}
.fc:hover{border-color:var(--bl);box-shadow:0 4px 16px rgba(0,0,0,.06)}
.fc h2{font-size:16px;font-weight:700;margin-bottom:6px}.fc p{font-size:11.5px;color:var(--sub)}.fc small{font-size:10px;color:var(--ht);display:block;margin-top:10px}
.pipeline{display:flex;gap:2px;margin-bottom:20px;overflow-x:auto}
.pip{flex:1;min-width:48px;padding:5px 2px;text-align:center;border-radius:6px;font-size:7px;font-weight:600;cursor:pointer;transition:.15s;line-height:1.2}
.pip b{display:block;font-size:10px}
.pip-done{background:var(--gnbg);color:var(--gn)}.pip-cur{background:var(--gn);color:#fff}.pip-fut{background:var(--bg);color:var(--ht)}
.deal-card{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:.15s}
.deal-card:hover{border-color:var(--bl);box-shadow:0 2px 10px rgba(0,0,0,.05)}
.dbar{display:flex;gap:1px;height:6px;border-radius:3px;overflow:hidden;margin-top:10px}
.dbar div{flex:1;border-radius:2px}.brd{background:var(--gn)}.brc{background:var(--am)}.brf{background:var(--bd)}
.section{background:var(--card);border:1px solid var(--bd);border-radius:11px;margin-bottom:10px;overflow:hidden}
.sh{padding:13px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.sh h3{font-size:13px;font-weight:600}
.sb{border-top:1px solid var(--bd);padding:14px 16px}
.inh{background:var(--bg);border-radius:7px;padding:8px 12px;margin-bottom:10px;font-size:11px;color:var(--sub)}
.inh b{font-size:9px;color:var(--ht);display:block;margin-bottom:2px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;font-size:12px}.g2 .k{color:var(--sub)}.g2 .v{font-weight:500}
table{width:100%;border-collapse:collapse;font-size:11px}th{padding:6px 8px;text-align:left;font-size:10px;color:var(--ht);background:var(--bg);border-bottom:1px solid var(--bd);font-weight:600}td{padding:7px 8px;border-bottom:1px solid var(--bd)}
.tag{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:600;white-space:nowrap}
.tg{background:var(--gnbg);color:var(--gn)}.tb{background:var(--blbg);color:var(--bl)}.ta{background:var(--ambg);color:var(--am)}.tr{background:var(--rdbg);color:var(--rd)}.tp2{background:var(--pubg);color:var(--pu)}.tt{background:var(--tlbg);color:var(--tl)}
.btn{padding:8px 16px;font-size:12px;font-weight:600;border-radius:8px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.15s}
.btn:hover{opacity:.85}
.bg{background:var(--gn);color:#fff}.bb{background:var(--bl);color:#fff}.bs{background:var(--card);border:1px solid var(--bd);color:var(--sub)}.bam{background:var(--am);color:#fff}.bpu{background:var(--pu);color:#fff}
.sm{padding:5px 10px;font-size:11px;border-radius:6px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:3px}.fg.full{grid-column:1/-1}
.fg label{font-size:11px;font-weight:600;color:var(--sub)}
.fg input,.fg select,.fg textarea{padding:7px 10px;border:1px solid var(--bd);border-radius:6px;font-size:12px;background:var(--card);color:var(--tx);font-family:inherit}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--bl)}
.fg input[readonly]{background:var(--bg);color:var(--sub)}
.fg textarea{resize:vertical;min-height:50px}
.disc{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;margin-bottom:8px}
.disc.hi{border-left:3px solid var(--rd)}.disc.md{border-left:3px solid var(--am)}
.vs{display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:center;margin:6px 0}
.vb{background:var(--bg);border-radius:5px;padding:5px 8px;font-size:11px}
.neq{font-size:14px;color:var(--rd);font-weight:700;text-align:center}
.hs{font-family:monospace;font-size:10px;background:var(--blbg);color:var(--bl);padding:2px 5px;border-radius:3px;font-weight:600}
.split{background:var(--pubg);border:1px solid var(--pu);border-radius:9px;padding:14px 16px;margin-bottom:12px}
.nt{padding:10px 14px;background:var(--blbg);border-radius:8px;font-size:11px;color:var(--bl);line-height:1.6;margin:12px 0}
.tot{display:flex;justify-content:space-between;padding:10px 0 0;font-size:14px;font-weight:700;border-top:2px solid var(--bd);margin-top:8px}
.new-tag{background:var(--ambg);color:var(--am);font-size:8px;padding:1px 5px;border-radius:3px;font-weight:700;margin-left:4px}

/* ═══ Dashboard ═══ */
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:16px;text-align:center}
.kpi .kpi-val{font-size:26px;font-weight:800;margin:4px 0}
.kpi .kpi-label{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px}
.kpi .kpi-delta{font-size:10px;font-weight:600;margin-top:4px}
.kpi .kpi-up{color:var(--gn)}.kpi .kpi-down{color:var(--rd)}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.chart-box{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:18px}
.chart-box h3{font-size:13px;font-weight:600;margin-bottom:14px}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:120px;padding-top:10px}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:4px}
.bar-fill{width:100%;border-radius:4px 4px 0 0;min-height:4px;transition:.3s}
.bar-label{font-size:8px;color:var(--ht);text-align:center;line-height:1.2}
.donut-wrap{display:flex;align-items:center;gap:20px}
.donut-legend{display:flex;flex-direction:column;gap:6px}
.donut-legend-item{display:flex;align-items:center;gap:6px;font-size:11px}
.donut-legend-item .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.risk-list{display:flex;flex-direction:column;gap:8px}
.risk-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:8px;font-size:12px}
.risk-item .risk-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}

/* ═══ Search & Filter ═══ */
.search-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.search-bar input{flex:1;min-width:180px;padding:8px 12px;border:1px solid var(--bd);border-radius:8px;font-size:12px;background:var(--card);color:var(--tx);font-family:inherit}
.search-bar input:focus{outline:none;border-color:var(--bl)}
.search-bar select{padding:8px 10px;border:1px solid var(--bd);border-radius:8px;font-size:11px;background:var(--card);color:var(--tx);font-family:inherit;cursor:pointer}
.search-bar select:focus{outline:none;border-color:var(--bl)}
.no-results{text-align:center;padding:40px 20px;color:var(--sub);font-size:13px}

/* ═══ Notifications ═══ */
.notif-bell{position:relative;width:34px;height:34px;border-radius:8px;border:1px solid var(--bd);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:.15s}
.notif-bell:hover{border-color:var(--bl)}
.notif-badge{position:absolute;top:-4px;right:-4px;background:var(--rd);color:#fff;font-size:9px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}
.notif-panel{position:absolute;top:42px;right:0;width:340px;max-height:420px;overflow-y:auto;background:var(--card);border:1px solid var(--bd);border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.12);z-index:100;padding:8px 0}
.notif-header{padding:10px 16px;font-size:13px;font-weight:700;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.notif-item{padding:10px 16px;border-bottom:1px solid var(--bd);cursor:pointer;transition:.1s;display:flex;gap:10px;align-items:flex-start}
.notif-item:hover{background:var(--bg)}
.notif-item:last-child{border-bottom:none}
.notif-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.notif-content{flex:1;min-width:0}
.notif-content .notif-title{font-size:12px;font-weight:600;margin-bottom:2px}
.notif-content .notif-desc{font-size:10px;color:var(--sub);line-height:1.4}
.notif-content .notif-time{font-size:9px;color:var(--ht);margin-top:3px}
.notif-unread{background:var(--blbg)}

/* ═══ Timeline ═══ */
.timeline{position:relative;padding-left:24px;margin-top:10px}
.timeline::before{content:"";position:absolute;left:9px;top:0;bottom:0;width:2px;background:var(--bd)}
.tl-item{position:relative;padding-bottom:16px}
.tl-item:last-child{padding-bottom:0}
.tl-dot{position:absolute;left:-24px;top:2px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;border:2px solid var(--card)}
.tl-dot-gn{background:var(--gnbg);color:var(--gn);border-color:var(--gn)}
.tl-dot-bl{background:var(--blbg);color:var(--bl);border-color:var(--bl)}
.tl-dot-am{background:var(--ambg);color:var(--am);border-color:var(--am)}
.tl-dot-rd{background:var(--rdbg);color:var(--rd);border-color:var(--rd)}
.tl-body{background:var(--bg);border-radius:8px;padding:10px 12px}
.tl-body .tl-title{font-size:12px;font-weight:600;margin-bottom:2px}
.tl-body .tl-desc{font-size:10px;color:var(--sub)}
.tl-body .tl-time{font-size:9px;color:var(--ht);margin-top:4px}

/* ═══ AI Chat ═══ */
.chat-fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#0C447C,#1D9E75);color:#fff;border:none;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:200;transition:.2s}
.chat-fab:hover{transform:scale(1.08)}
.chat-panel{position:fixed;bottom:86px;right:24px;width:360px;height:500px;background:var(--card);border:1px solid var(--bd);border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,.15);z-index:200;display:flex;flex-direction:column;overflow:hidden}
.chat-head{padding:14px 16px;background:linear-gradient(135deg,#0C447C,#1D9E75);color:#fff;display:flex;align-items:center;gap:10px}
.chat-head h3{font-size:14px;font-weight:600;flex:1}
.chat-close{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;opacity:.8}
.chat-close:hover{opacity:1}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.chat-msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:12px;line-height:1.5;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.chat-msg.bot{background:var(--bg);color:var(--tx);align-self:flex-start;border-bottom-left-radius:4px}
.chat-msg.user{background:var(--bl);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.chat-msg .msg-time{font-size:9px;opacity:.6;margin-top:4px}
.chat-input-row{padding:10px 14px;border-top:1px solid var(--bd);display:flex;gap:8px}
.chat-input-row input{flex:1;padding:9px 12px;border:1px solid var(--bd);border-radius:8px;font-size:12px;background:var(--bg);color:var(--tx);font-family:inherit}
.chat-input-row input:focus{outline:none;border-color:var(--bl)}
.chat-send{width:36px;height:36px;border-radius:8px;border:none;background:var(--bl);color:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.chat-send:hover{opacity:.85}
.chat-suggest{display:flex;flex-wrap:wrap;gap:6px;padding:0 14px 10px}
.chat-chip{padding:5px 10px;border:1px solid var(--bd);border-radius:16px;font-size:10px;color:var(--sub);cursor:pointer;background:var(--card);transition:.15s;white-space:nowrap}
.chat-chip:hover{border-color:var(--bl);color:var(--bl);background:var(--blbg)}
.typing-indicator{display:flex;gap:4px;padding:10px 14px;align-self:flex-start}
.typing-indicator span{width:6px;height:6px;background:var(--ht);border-radius:50%;animation:blink 1.4s infinite both}
.typing-indicator span:nth-child(2){animation-delay:.2s}
.typing-indicator span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}

/* ═══ Tab nav ═══ */
.tab-nav{display:flex;gap:2px;margin-bottom:16px;background:var(--bg);border-radius:10px;padding:3px}
.tab-btn{flex:1;padding:8px 12px;border:none;background:transparent;border-radius:8px;font-size:12px;font-weight:600;color:var(--sub);cursor:pointer;transition:.15s;text-align:center}
.tab-btn.active{background:var(--card);color:var(--tx);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tab-btn:hover:not(.active){color:var(--tx)}

/* ═══ Upload Zone ═══ */
.upload-zone{border:2px dashed var(--bd);border-radius:12px;padding:28px 20px;text-align:center;cursor:pointer;transition:.2s;background:var(--bg);margin-bottom:16px;position:relative}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--bl);background:var(--blbg)}
.upload-zone .uz-icon{font-size:32px;margin-bottom:8px}
.upload-zone .uz-title{font-size:13px;font-weight:600;margin-bottom:4px}
.upload-zone .uz-desc{font-size:10px;color:var(--sub)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-progress{margin-bottom:16px}
.upload-progress .up-bar-bg{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin:8px 0}
.upload-progress .up-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--bl),var(--gn));transition:width .3s}
.upload-progress .up-status{font-size:11px;color:var(--sub);display:flex;justify-content:space-between}
.upload-file-info{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);border-radius:8px;margin-bottom:12px}
.upload-file-info .ufi-icon{font-size:22px}
.upload-file-info .ufi-name{font-size:12px;font-weight:600}
.upload-file-info .ufi-size{font-size:10px;color:var(--sub)}
.upload-file-info .ufi-remove{margin-left:auto;color:var(--rd);cursor:pointer;font-size:14px;padding:4px}
.ocr-result{border:1px solid var(--gn);border-radius:10px;padding:14px 16px;margin-bottom:16px;background:var(--gnbg)}
.ocr-result h4{font-size:12px;font-weight:700;color:var(--gn);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.ocr-result .ocr-items{display:flex;flex-direction:column;gap:4px}
.ocr-result .ocr-item{display:flex;align-items:center;gap:8px;font-size:11px;padding:4px 0}
.ocr-result .ocr-item .ocr-label{color:var(--sub);min-width:100px}
.ocr-result .ocr-item .ocr-val{font-weight:600}
.ocr-result .ocr-item .ocr-check{color:var(--gn);font-weight:700}
.fg.auto-filled input,.fg.auto-filled select{border-color:var(--gn);background:var(--gnbg);animation:autoFillPulse .6s ease}
.fg.auto-filled label{color:var(--gn)}
.fg.auto-filled label::after{content:" ✓ AI読取";font-size:9px;font-weight:700;margin-left:4px}
@keyframes autoFillPulse{0%{box-shadow:0 0 0 0 rgba(29,158,117,.4)}70%{box-shadow:0 0 0 6px rgba(29,158,117,0)}100%{box-shadow:0 0 0 0 rgba(29,158,117,0)}}
.ocr-step{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:11px}
.ocr-step .ocr-step-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.ocr-step .ocr-step-done{background:var(--gnbg);color:var(--gn)}
.ocr-step .ocr-step-active{background:var(--blbg);color:var(--bl);animation:spin 1s linear infinite}
.ocr-step .ocr-step-pending{background:var(--bg);color:var(--ht)}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.items-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
.items-table th{padding:6px 8px;text-align:left;font-size:10px;color:var(--ht);background:var(--bg);border-bottom:1px solid var(--bd);font-weight:600}
.items-table td{padding:7px 8px;border-bottom:1px solid var(--bd)}
.items-table input{width:100%;padding:5px 8px;border:1px solid var(--bd);border-radius:5px;font-size:11px;background:var(--card);color:var(--tx);font-family:inherit}
.items-table input.ai-filled{border-color:var(--gn);background:var(--gnbg)}
.add-row-btn{width:100%;padding:8px;border:1px dashed var(--bd);border-radius:6px;background:transparent;color:var(--sub);font-size:11px;cursor:pointer;margin-top:6px;transition:.15s}
.add-row-btn:hover{border-color:var(--bl);color:var(--bl)}

@media(max-width:600px){.flows,.fr,.g2,.chart-row{grid-template-columns:1fr}.dash-grid{grid-template-columns:1fr 1fr}.pip{min-width:38px;font-size:6px}.pip b{font-size:9px}.chat-panel{width:calc(100vw - 32px);right:16px;bottom:80px;height:60vh}.notif-panel{width:calc(100vw - 40px);right:-10px}}
</style>
</head>
<body>
<div class="app" id="app">読み込み中...</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script>
var h=React.createElement,us=React.useState,ue=React.useEffect,ur=React.useRef,N=function(n){return typeof n==="number"?n.toLocaleString():n};
// ═══ 14 Import Steps ═══
var IM=[{n:"引合・発注"},{n:"与信管理",nw:1},{n:"契約・L/C"},{n:"保険・為替予約",nw:1},{n:"書類受領・OCR"},{n:"書類照合"},{n:"HS・関税"},{n:"許可申請・法規",nw:1},{n:"通関申告"},{n:"検品・入庫"},{n:"在庫管理",nw:1},{n:"仕入伝票"},{n:"支払・L/C決済"},{n:"原価計算"}];
// ═══ 11 Export Steps ═══
var EX=[{n:"受注・契約"},{n:"与信管理",nw:1},{n:"安全保障・コンプラ",nw:1},{n:"該非判定"},{n:"輸出許可(E/L)",nw:1},{n:"書類作成"},{n:"輸出通関"},{n:"船積・B/L"},{n:"売上伝票"},{n:"請求・入金・消込"},{n:"為替差損益"}];

  function goNew(){spg("new")}

  var steps=flow==="import"?IM:EX;
  var deals=flow==="import"?IMD:EXD;
  var fn=flow==="import"?"輸入業務":"輸出業務";

  // Filter & search logic
  function getFilteredDeals(){
    var list=deals.slice();
    if(query){var q=query.toLowerCase();list=list.filter(function(d){return d.id.toLowerCase().indexOf(q)>=0||d.sup.toLowerCase().indexOf(q)>=0||d.co.toLowerCase().indexOf(q)>=0})}
    if(filterCur!=="all"){list=list.filter(function(d){return d.cur===filterCur})}
    if(filterStep!=="all"){
