// ═══ chemSHERPA XML Parser ═══
function parseChemSherpaXML(xmlStr){
  var parser=new DOMParser();
  var doc=parser.parseFromString(xmlStr,"text/xml");
  var results=[];
  // Try chemSHERPA-CI format: look for substance/component nodes
  var substances=doc.querySelectorAll("Substance, substance, Component, component, Chemical, chemical, Material, material");
  if(substances.length===0){
    // Fallback: scan all elements for CAS patterns
    var all=doc.querySelectorAll("*");
    for(var i=0;i<all.length;i++){
      var txt=all[i].textContent||"";
      var cas=txt.match(/\b(\d{2,7}-\d{2}-\d)\b/);
      if(cas){
        var name=all[i].getAttribute("name")||all[i].getAttribute("Name")||all[i].getAttribute("substanceName")||all[i].parentElement&&all[i].parentElement.getAttribute("name")||"Unknown ("+cas[1]+")";
        if(!results.some(function(r){return r.cas===cas[1]})){
          results.push({cas:cas[1],name:name,conc:all[i].getAttribute("concentration")||all[i].getAttribute("Concentration")||all[i].getAttribute("content")||"-"});
        }
      }
    }
  }else{
    substances.forEach(function(node){
      var cas=node.getAttribute("casNumber")||node.getAttribute("CASNumber")||node.getAttribute("cas")||node.getAttribute("CAS")||"";
      if(!cas){var t=node.textContent||"";var m=t.match(/\b(\d{2,7}-\d{2}-\d)\b/);if(m)cas=m[1];}
      if(!cas)return;
      var name=node.getAttribute("name")||node.getAttribute("Name")||node.getAttribute("substanceName")||node.getAttribute("SubstanceName")||"Unknown ("+cas+")";
      var conc=node.getAttribute("concentration")||node.getAttribute("Concentration")||node.getAttribute("content")||node.getAttribute("Content")||"-";
      if(!results.some(function(r){return r.cas===cas})){results.push({cas:cas,name:name,conc:conc});}
    });
  }
  return results;
}

// ═══ PFAS keyword matcher ═══
function matchPFAS(cas,name){
  var knownPFAS={"335-67-1":"yes","1763-23-1":"yes","375-73-5":"suspected","2058-94-8":"yes","307-55-1":"suspected","376-06-7":"unknown","27619-97-2":"suspected","9002-84-0":"yes","24937-79-9":"yes","2795-39-3":"unknown","355-46-4":"yes","678-39-7":"unknown","1691-99-2":"unknown","865-86-1":"unknown","2991-51-7":"yes","335-76-2":"suspected","68259-12-1":"suspected","742-73-4":"yes","13252-13-6":"unknown","375-22-4":"suspected","2706-90-3":"unknown","307-24-4":"suspected","108427-53-8":"unknown","171978-95-3":"unknown","335-77-3":"suspected"};
  if(knownPFAS[cas])return knownPFAS[cas];
  var nm=(name||"").toLowerCase();
  if(/pfas|pfoa|pfos|pfhxs|ptfe|pvdf|fluoro|perfluor/.test(nm))return"suspected";
  return"unknown";
}

// ═══ EML file parser ═══
function parseEmlFile(text,filename){
  var sep=text.indexOf('\n\n');if(sep<0)sep=text.indexOf('\r\n\r\n');
  var hdrText=sep>0?text.substring(0,sep):'';
  var body=sep>0?text.substring(sep+2).trim():text;
  var hdr={};
  hdrText.replace(/\r/g,'').split('\n').forEach(function(l){
    var m=l.match(/^([A-Za-z-]+):\s*(.*)/);if(m)hdr[m[1].toLowerCase()]=m[2];
  });
  // Decode quoted-printable
  if((hdr['content-transfer-encoding']||'').toLowerCase().indexOf('quoted')>=0)
    body=body.replace(/=[\r\n]+/g,'').replace(/=([0-9A-Fa-f]{2})/g,function(_,h){return String.fromCharCode(parseInt(h,16));});
  // Strip HTML
  if(/<(html|body|div|p)\b/i.test(body))
    body=body.replace(/<[^>]+>/g,' ').replace(/&nbsp;/g,' ').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/\s{3,}/g,'\n');
  // Parse From
  var fromRaw=hdr['from']||'';
  var fp=fromRaw.match(/^"?([^"<]+?)"?\s*<([^>]+)>$/);
  var fromName=fp?fp[1].trim():fromRaw.split('@')[0];
  var fromEmail=fp?fp[2].trim():fromRaw.trim();
  var subject=hdr['subject']||filename||'';
  var dateStr='';try{dateStr=new Date(hdr['date']||'').toISOString().substring(0,10);}catch(e){dateStr=new Date().toISOString().substring(0,10);}
  // Auto-extract case fields from body+subject
  var full=subject+'\n'+body;
  var format='chemSHERPA-CI';
  if(/chemSHERPA.AI/i.test(full))format='chemSHERPA-AI';else if(/\bIMDS\b/i.test(full))format='IMDS';
  var priority='medium';
  if(/至急|urgent|high.*priority|緊急|critical/i.test(full))priority='high';
  else if(/\blow\b|低優先/i.test(full))priority='low';
  var deadline='';
  var dlm=full.match(/(\d{4})[年\-\/](\d{1,2})[月\-\/](\d{1,2})/);
  if(dlm)deadline=dlm[1]+'-'+dlm[2].padStart(2,'0')+'-'+dlm[3].padStart(2,'0');
  var customer=fromName||'';
  var dm=fromEmail.match(/@([^.]+)\./);if(dm&&!customer)customer=dm[1].charAt(0).toUpperCase()+dm[1].slice(1);
  // Products: part numbers
  var products=[];
  var pms=full.match(/(?:型番|Part\s*No\.?|P\/N|品番)[：:\s]+([A-Z0-9][A-Z0-9\-]{2,})/gi)||[];
  pms.forEach(function(pm){var pn=pm.replace(/.*[：:\s]/,'').trim();if(!products.some(function(p){return p.partNo===pn;}))products.push({name:'',partNo:pn});});
  if(!products.length)products.push({name:'',partNo:''});
  return{id:'eml-'+Date.now(),from:fromEmail,fromName:fromName||fromEmail,subject:subject,date:dateStr,body:body.substring(0,3000),
    extracted:{customer:customer,contact:fromName,division:'',email:fromEmail,deadline:deadline,format:format,priority:priority,products:products}};
}
